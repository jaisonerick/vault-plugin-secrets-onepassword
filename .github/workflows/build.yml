name: Build and Test

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - $default-branch

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ^1.25

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./... -cover
